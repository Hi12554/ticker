<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Live Score Ticker</title>
    <style>
        @import url('https://fonts.googleapis.com');

        body { 
            margin: 0; 
            background: transparent; 
            overflow: hidden; 
            font-family: 'Inter', sans-serif; 
        }

        #ticker-container {
            width: 95%; /* Margin from edges for a floating look */
            max-width: 1200px;
            height: 50px; 
            background: rgba(15, 15, 15, 0.85); 
            backdrop-filter: blur(10px); /* Modern glass effect */
            color: white;
            display: flex; 
            align-items: center; 
            position: absolute; 
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 4px;
            border-left: 5px solid #cc0000; /* Left accent bar */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* Category Label */
        #league-tag {
            background: #cc0000; 
            padding: 0 20px; 
            height: 100%;
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-weight: 900; 
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 2;
            position: relative;
        }

        /* Beveled edge for the tag */
        #league-tag::after {
            content: "";
            position: absolute;
            right: -15px;
            top: 0;
            border-top: 50px solid #cc0000;
            border-right: 15px solid transparent;
        }

        #score-wrapper {
            padding-left: 35px;
            flex-grow: 1;
            display: flex;
            align-items: center;
        }

        #score-content { 
            font-size: 20px; 
            font-weight: 700; 
            letter-spacing: -0.5px;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Subtle "Live" pulse dot */
        .live-dot {
            height: 8px;
            width: 8px;
            background-color: #ff3333;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
            100% { transform: scale(0.9); opacity: 1; }
        }

        /* Animation Classes */
        .exit {
            opacity: 0;
            transform: translateX(-20px);
        }
        .enter {
            opacity: 1;
            transform: translateX(0);
        }
    </style>
</head>
<body>

    <div id="ticker-container">
        <div id="league-tag">LIVE</div>
        <div id="score-wrapper">
            <div id="score-content" class="enter">
                <span class="live-dot"></span>Fetching latest updates...
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTg-Tz5E3I18evi1F9nY5GC0WP2IF9X5qUKpdRPr9DCEpbptJ6RP3WNrHdtIKS20aIapvyV_mmQ6-6h/pub?output=csv';
        const FETCH_INTERVAL = 30000;
        const ROTATE_INTERVAL = 6000;

        let scores = [];
        let currentIndex = 0;

        async function fetchScores() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                const rows = data.split('\n').filter(row => row.trim() !== "");
                
                if (rows.length > 1) {
                    scores = rows.slice(1).map(row => {
                        // Better CSV parsing to handle quotes/commas
                        const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                        return { 
                            league: cols[0] ? cols[0].replace(/"/g, '').trim() : "LIVE", 
                            text: cols[1] ? cols[1].replace(/"/g, '').trim() : "" 
                        };
                    });
                }
            } catch (e) { console.error("Update failed", e); }
        }

        function flip() {
            if (scores.length === 0) return;

            const content = document.getElementById('score-content');
            const tag = document.getElementById('league-tag');

            content.classList.add('exit');

            setTimeout(() => {
                currentIndex = (currentIndex + 1) % scores.length;
                
                tag.innerText = scores[currentIndex].league;
                content.innerHTML = `<span class="live-dot"></span>${scores[currentIndex].text}`;

                content.classList.remove('exit');
                content.classList.add('enter');
            }, 500);
        }

        fetchScores();
        setInterval(fetchScores, FETCH_INTERVAL); 
        setInterval(flip, ROTATE_INTERVAL);
    </script>
</body>
</html>
