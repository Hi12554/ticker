<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Live Score Ticker</title>
    <style>
        @import url('https://fonts.googleapis.com');

        /* CRITICAL FOR TRANSPARENCY */
        html, body { 
            margin: 0; 
            padding: 0;
            background-color: transparent !important; 
            background: none !important;
            overflow: hidden; 
            font-family: 'Inter', sans-serif; 
        }

        #ticker-container {
            width: 95%; 
            max-width: 1100px;
            height: 48px; 
            background: rgba(18, 18, 18, 0.9); /* Dark semi-transparent bar */
            backdrop-filter: blur(8px); /* Glass effect (visible in OBS) */
            color: white;
            display: flex; 
            align-items: center; 
            position: absolute; 
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 4px;
            border-left: 4px solid #cc0000; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        #league-tag {
            background: #cc0000; 
            padding: 0 20px; 
            height: 100%;
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-weight: 900; 
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            position: relative;
            z-index: 2;
        }

        /* Diagonal slant for the league tag */
        #league-tag::after {
            content: "";
            position: absolute;
            right: -12px;
            top: 0;
            border-top: 48px solid #cc0000;
            border-right: 12px solid transparent;
        }

        #score-wrapper {
            padding-left: 30px;
            flex-grow: 1;
            display: flex;
            align-items: center;
        }

        #score-content { 
            font-size: 19px; 
            font-weight: 700; 
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Pulse dot for live feel */
        .live-dot {
            height: 8px;
            width: 8px;
            background-color: #ff3333;
            border-radius: 50%;
            display: inline-block;
            margin-right: 12px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.4; }
            100% { transform: scale(0.9); opacity: 1; }
        }

        /* Animation States */
        .exit { opacity: 0; transform: translateX(-15px); }
        .enter { opacity: 1; transform: translateX(0); }
    </style>
</head>
<body>

    <div id="ticker-container">
        <div id="league-tag">LIVE</div>
        <div id="score-wrapper">
            <div id="score-content" class="enter">
                <span class="live-dot"></span>Updating scores...
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com';
        const FETCH_INTERVAL = 30000;
        const ROTATE_INTERVAL = 6000;

        let scores = [];
        let currentIndex = 0;

        async function fetchScores() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                const rows = data.split('\n').filter(row => row.trim() !== "");
                
                if (rows.length > 1) {
                    scores = rows.slice(1).map(row => {
                        // Regex to correctly handle commas inside quotes
                        const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                        return { 
                            league: cols[0] ? cols[0].replace(/"/g, '').trim() : "LIVE", 
                            text: cols[1] ? cols[1].replace(/"/g, '').trim() : "" 
                        };
                    });
                }
            } catch (e) { console.error("Update failed", e); }
        }

        function flip() {
            if (scores.length === 0) return;
            const content = document.getElementById('score-content');
            const tag = document.getElementById('league-tag');

            content.classList.add('exit');

            setTimeout(() => {
                currentIndex = (currentIndex + 1) % scores.length;
                tag.innerText = scores[currentIndex].league;
                content.innerHTML = `<span class="live-dot"></span>${scores[currentIndex].text}`;
                content.classList.remove('exit');
                content.classList.add('enter');
            }, 500);
        }

        fetchScores();
        setInterval(fetchScores, FETCH_INTERVAL); 
        setInterval(flip, ROTATE_INTERVAL);
    </script>
</body>
</html>
